name: Build Android

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        id: build
        run: |
          ./gradlew assembleDebug --no-daemon 2>&1 | tee build-log.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt
          retention-days: 7

      - name: Run unit tests
        if: steps.build.outcome == 'success'
        run: ./gradlew testDebugUnitTest --stacktrace --no-daemon 2>&1 | tee test-log.txt
        continue-on-error: true

      - name: Upload test log
        if: always() && steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test-log.txt
          retention-days: 7

      - name: Run lint
        if: steps.build.outcome == 'success'
        run: ./gradlew lint --no-daemon
        continue-on-error: true

      - name: Upload debug APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: adaptive-launcher-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            app/build/reports/tests/
            app/build/reports/lint-results*.html
          retention-days: 7

      - name: Verify APK exists
        if: steps.build.outcome == 'success'
        run: |
          if [ ! -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "ERROR: APK was not produced!"
            exit 1
          fi
          echo "APK produced successfully"
          ls -la app/build/outputs/apk/debug/
