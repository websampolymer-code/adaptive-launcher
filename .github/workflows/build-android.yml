name: Build Android

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        id: build
        run: ./gradlew assembleDebug --no-daemon 2>&1 | tee build-output.txt; exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Show build output on failure
        if: steps.build.outcome == 'failure'
        run: |
          echo "## Build Failed - Last 150 lines:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -150 build-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build-output.txt
          retention-days: 7

      - name: Run unit tests
        if: steps.build.outcome == 'success'
        run: ./gradlew testDebugUnitTest --no-daemon
        continue-on-error: true

      - name: Run lint
        if: steps.build.outcome == 'success'
        run: ./gradlew lint --no-daemon
        continue-on-error: true

      - name: Upload debug APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: adaptive-launcher-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Verify build
        if: steps.build.outcome == 'success'
        run: |
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "APK produced successfully"
            ls -la app/build/outputs/apk/debug/
          else
            echo "WARNING: APK not found but build succeeded"
          fi
