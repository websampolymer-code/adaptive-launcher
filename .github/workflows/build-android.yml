name: Build Android

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        id: build
        run: ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee build-output.txt
        continue-on-error: true

      - name: Report build output
        if: always()
        run: |
          echo "## Build Result: ${{ steps.build.outcome }}" >> $GITHUB_STEP_SUMMARY
          if [ -f build-output.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -200 build-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build-output.txt
          retention-days: 7

      - name: Upload debug APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: adaptive-launcher-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
